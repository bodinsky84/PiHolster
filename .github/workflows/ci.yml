name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Web — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm --filter web lint

      - name: pnpm build
        run: pnpm --filter web build

      # Upload dist/ so the backend job can embed it.
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/piholsterd/internal/api/dist/
          retention-days: 1

  backend:
    name: Go — vet & test
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # Download the built web UI so go:embed compiles cleanly.
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/piholsterd/internal/api/dist/

      - name: go mod tidy (piholsterd)
        working-directory: apps/piholsterd
        env:
          CGO_ENABLED: "0"
        run: go mod tidy

      - name: go mod tidy (piholster-arpd)
        working-directory: apps/piholster-arpd
        env:
          CGO_ENABLED: "0"
        run: go mod tidy

      - name: go vet
        env:
          CGO_ENABLED: "0"
        run: |
          go vet ./apps/piholsterd/...
          go vet ./apps/piholster-arpd/...

      - name: go test piholsterd
        env:
          CGO_ENABLED: "0"
        run: go test -race -count=1 ./apps/piholsterd/...

      - name: go test piholster-arpd
        env:
          CGO_ENABLED: "0"
        run: go test -race -count=1 ./apps/piholster-arpd/...

  cross-compile:
    name: Cross-compile linux/arm/v7
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/piholsterd/internal/api/dist/

      - name: Build piholsterd for linux/arm/v7
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: "7"
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o /dev/null \
            ./apps/piholsterd/cmd/piholsterd

      - name: Build piholster-arpd for linux/arm/v7
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: "7"
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o /dev/null \
            ./apps/piholster-arpd/cmd/piholster-arpd

  smoke:
    name: Smoke tests (skipped without PI_IP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go mod tidy (smoke)
        working-directory: tests/smoke
        env:
          CGO_ENABLED: "0"
        run: go mod tidy

      - name: go vet (smoke)
        env:
          CGO_ENABLED: "0"
        run: go vet ./tests/smoke/...

      # PI_IP is not set → TestMain exits 0 immediately.
      - name: go test (smoke, compile-only without PI_IP)
        env:
          CGO_ENABLED: "0"
        run: go test -run=^$ ./tests/smoke/...

  manifest-format:
    name: MANIFEST format regression (US-25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Asserts every field in image/MANIFEST.example is still generated by
      # image/build.sh. Fails before IT-säk's M-04 sign-off can rot silently.
      - name: bash image/manifest_format_test.sh
        run: bash image/manifest_format_test.sh
