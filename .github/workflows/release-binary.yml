name: Release — Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Cross-compile & upload
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-arm-v7
          - goos: linux
            goarch: arm64
            goarm: ""
            suffix: linux-arm64
          - goos: linux
            goarch: amd64
            goarm: ""
            suffix: linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build ${{ matrix.suffix }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "piholsterd-${{ matrix.suffix }}" \
            ./apps/piholsterd/cmd/piholsterd

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: piholsterd-${{ matrix.suffix }}
